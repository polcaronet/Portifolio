<div class="tt-wrapper">

  <!-- Preview fica em cima do embed enquanto não clicou -->
  <div class="tt-preview" *ngIf="!playing" (click)="startVideo()">
    <div class="tt-preview__play">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    </div>
    <div class="tt-preview__info">
      <span class="tt-preview__handle">&#64;anselmopolcaro</span>
      <span class="tt-preview__title">{{ title }}</span>
      <span class="tt-preview__hint">Clique para reproduzir</span>
    </div>
  </div>

  <!-- Embed SEMPRE no DOM — só fica visível após clicar -->
  <div class="tt-embed-container" [class.tt-embed-container--visible]="playing"
    [class.tt-embed-container--overlay-on]="overlayVisible">

    <!-- Overlay que cobre os relacionados quando o vídeo termina -->
    <div class="tt-overlay" *ngIf="overlayVisible">
      <div class="tt-overlay__content">
        <div class="tt-overlay__emoji">🎙️</div>
        <p class="tt-overlay__title">{{ title }}</p>
        <div class="tt-overlay__actions">
          <button class="tt-overlay__btn tt-overlay__btn--replay" (click)="resetVideo()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"></polyline>
              <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
            </svg>
            Assistir de novo
          </button>
          <button class="tt-overlay__btn tt-overlay__btn--tiktok" (click)="openTikTok()">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
            </svg>
            Ver no TikTok
          </button>
        </div>
      </div>
    </div>

    <!-- Blockquote oficial do TikTok — sempre no DOM -->
    <blockquote class="tiktok-embed" [attr.cite]="'https://www.tiktok.com/@anselmopolcaro/video/' + videoId"
      [attr.data-video-id]="videoId" style="max-width:605px; min-width:325px;">
      <section>
        <a [href]="'https://www.tiktok.com/@anselmopolcaro/video/' + videoId" target="_blank" rel="noopener">Assistir no
          TikTok</a>
      </section>
    </blockquote>

  </div>

</div>
